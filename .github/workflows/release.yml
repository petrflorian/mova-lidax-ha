name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build HACS zip
        run: |
          mkdir -p dist
          cd custom_components/mova_lidax
          zip -r ../../dist/mova_lidax.zip . \
            -x "*/__pycache__/*" "*.pyc" ".DS_Store"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mova_lidax.zip
          generate_release_notes: true
